version: '3.8'

services:
  mission-control:
    build: .
    container_name: mission-control
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - server/.env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
