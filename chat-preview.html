<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --bg3:#ebebeb;
  --surface:#ffffff;
  --border:#e5e5e5;
  --border2:#d4d4d4;
  --text:#0a0a0a;
  --text2:#525252;
  --text3:#a3a3a3;
  --black:#0a0a0a;
  --accent:#0a0a0a;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,.08);
  --red:#ef4444;
  --blue:#3b82f6;
  --orange:#f97316;
  --user-bubble:#0a0a0a;
  --user-text:#ffffff;
  --ai-bubble:#f5f5f5;
  --ai-text:#0a0a0a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --r:14px;
  --rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* ===== HEADER ===== */
.header{
  flex-shrink:0;
  padding:10px 20px;
  padding-top:calc(10px + var(--safe-top));
  border-bottom:1px solid var(--border);
  background:var(--bg);
  z-index:10;
}
.h-row{display:flex;align-items:center;justify-content:space-between}
.h-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.h-right{display:flex;align-items:center;gap:6px}
.h-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.h-status{font-size:11px;color:var(--text3);font-weight:500}

/* ===== TABS ===== */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--bg);
}
.tab{
  flex:1;text-align:center;
  padding:11px 0;
  font-size:13px;font-weight:600;
  color:var(--text3);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{color:var(--black);border-bottom-color:var(--black)}

/* ===== PANELS ===== */
.panel{flex:1;overflow:hidden;display:none;flex-direction:column}
.panel.active{display:flex}

/* ===== CHAT PANEL ===== */
.chat-messages{
  flex:1;overflow-y:auto;
  padding:16px 16px 8px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  display:flex;flex-direction:column;
}
.chat-messages>*{animation:msgIn .25s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Message rows */
.msg-row{display:flex;margin-bottom:10px;max-width:88%}
.msg-row.user{align-self:flex-end}
.msg-row.ai{align-self:flex-start}

.bubble{
  padding:10px 14px;
  font-size:14px;line-height:1.5;
  border-radius:18px;
  word-break:break-word;
}
.msg-row.user .bubble{
  background:var(--user-bubble);color:var(--user-text);
  border-bottom-right-radius:4px;
}
.msg-row.ai .bubble{
  background:var(--ai-bubble);color:var(--ai-text);
  border-bottom-left-radius:4px;
  border:1px solid var(--border);
}

/* Action cards inside AI messages */
.action-card{
  margin-top:8px;
  padding:10px 12px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--rs);
  font-size:12px;
}
.action-card .ac-type{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:4px;
}
.ac-task{color:var(--green)}
.ac-add{color:var(--green)}
.ac-remind{color:var(--orange)}
.ac-note{color:var(--blue)}
.ac-done{color:var(--green)}
.ac-check{color:var(--green)}
.ac-uncheck{color:var(--orange)}
.ac-query{color:var(--blue)}
.ac-report{color:var(--blue)}
.ac-update{color:var(--orange)}
.ac-schedule{color:var(--orange)}
.ac-prioritize{color:var(--orange)}
.action-card .ac-name{font-weight:600;font-size:13px}
.action-card .ac-detail{color:var(--text2);font-size:11px;margin-top:2px}

/* Typing indicator */
.typing-indicator{align-self:flex-start;margin-bottom:10px}
.typing-indicator .bubble{display:flex;gap:4px;padding:12px 16px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typingBounce .6s infinite alternate}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{from{opacity:.3;transform:translateY(0)}to{opacity:1;transform:translateY(-3px)}}

/* Time label */
.time-label{
  text-align:center;font-size:10px;
  color:var(--text3);font-weight:500;
  margin:12px 0 8px;
}

/* ===== CHAT INPUT ===== */
.chat-input-wrap{
  flex-shrink:0;
  padding:8px 12px;
  padding-bottom:calc(8px + var(--safe-bottom));
  border-top:1px solid var(--border);
  background:var(--bg);
}
.chat-input-row{
  display:flex;align-items:flex-end;gap:8px;
}
.chat-textarea{
  flex:1;
  border:1px solid var(--border);
  border-radius:22px;
  padding:10px 16px;
  font-family:inherit;font-size:14px;
  color:var(--text);background:var(--bg2);
  outline:none;resize:none;
  min-height:42px;max-height:120px;
  line-height:1.4;
  transition:border-color .15s;
}
.chat-textarea:focus{border-color:var(--black)}
.chat-textarea::placeholder{color:var(--text3)}
.chat-send{
  width:42px;height:42px;
  border-radius:50%;border:none;
  background:var(--black);color:#fff;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.chat-send:active{transform:scale(.92);background:#333}
.chat-send:disabled{background:var(--bg3);color:var(--text3)}
.mic-btn{
  width:42px;height:42px;
  border-radius:50%;border:2px solid var(--border);
  background:var(--bg);color:var(--text2);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.mic-btn:active{border-color:var(--black);color:var(--black)}
.mic-btn.recording{
  border-color:var(--red);color:var(--red);
  animation:micPulse 1.5s infinite;
}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* ===== TASKS PANEL ===== */
.tasks-scroll{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
.tasks-pad{padding:12px 16px calc(12px + var(--safe-bottom))}

/* Priority sections */
.pri-section{margin-bottom:12px}
.pri-head{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;margin-bottom:4px;
}
.pri-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pri-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.pri-count{margin-left:auto;font-size:11px;color:var(--text3);font-weight:600}

/* Task items */
.t-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rs);
  margin-bottom:4px;
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  animation:slideIn .2s ease both;
}
.t-item:active{background:var(--bg2);transform:scale(.985)}
.t-item.done{opacity:.3}
.t-item.done .t-name{text-decoration:line-through;color:var(--text3)}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.t-chk{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.t-chk.done{background:var(--black);border-color:var(--black)}
.t-chk.done::after{content:'\2713';color:#fff;font-size:11px;font-weight:700}

.t-body{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:600;line-height:1.4}
.t-sub{font-size:11px;color:var(--text3);margin-top:1px}
.t-meta{display:flex;gap:4px;margin-top:4px}
.t-badge{
  font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:6px;
  letter-spacing:.2px;
}
.b-content{background:#fef2f2;color:#dc2626}
.b-auto{background:#eff6ff;color:#2563eb}
.b-growth{background:#f5f3ff;color:#7c3aed}
.b-infra{background:var(--green-bg);color:#16a34a}
.t-dur{
  font-size:10px;font-weight:600;color:var(--text3);
  background:var(--bg2);padding:3px 8px;border-radius:6px;
  flex-shrink:0;
}

/* Stats bar at top of tasks */
.stats-bar{
  display:flex;gap:0;
  margin-bottom:12px;
  border:1px solid var(--border);
  border-radius:var(--rs);
  overflow:hidden;
}
.stat-item{
  flex:1;padding:12px 8px;text-align:center;
  border-right:1px solid var(--border);
}
.stat-item:last-child{border-right:none}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1}
.stat-label{font-size:9px;font-weight:600;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* Filter pills */
.filters{
  display:flex;gap:6px;
  margin-bottom:12px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.filters::-webkit-scrollbar{display:none}
.fpill{
  padding:6px 12px;border-radius:20px;
  font-size:11px;font-weight:600;white-space:nowrap;
  cursor:pointer;
  background:var(--bg2);color:var(--text2);
  border:1px solid transparent;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.fpill.active{background:var(--black);color:#fff}

/* ===== INSIGHTS PANEL ===== */
.insights-scroll{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.insights-pad{padding:0 0 calc(16px + var(--safe-bottom))}
.ins-title{font-size:15px;font-weight:700;margin-bottom:12px}
.ins-card{
  background:var(--bg2);border-radius:var(--rs);
  padding:14px 16px;margin-bottom:8px;
  font-size:13px;line-height:1.6;color:var(--text2);
}
.ins-card .ins-icon{font-size:16px;margin-bottom:6px}
.ins-card .ins-head{font-weight:700;color:var(--text);margin-bottom:4px;font-size:13px}
.ins-card .ins-highlight{color:var(--black);font-weight:700}
.ins-refresh{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 14px;border-radius:20px;
  font-size:11px;font-weight:600;
  background:var(--black);color:#fff;
  border:none;cursor:pointer;margin-bottom:12px;
}
.ins-refresh:active{opacity:.7}
.obj-mini{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rs);padding:12px 14px;margin-bottom:6px;
}
.obj-mini-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.obj-mini-name{font-size:13px;font-weight:700}
.obj-mini-pct{font-size:12px;font-weight:700;color:var(--text3)}
.obj-mini-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.obj-mini-fill{height:100%;border-radius:2px;background:var(--black)}

/* ===== PROGRESS RING ===== */
.progress-hero{
  display:flex;align-items:center;justify-content:center;
  gap:24px;padding:20px 16px 16px;
}
.ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.ring-center{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-pct{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.ring-label{font-size:10px;font-weight:600;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.hero-stats{display:flex;flex-direction:column;gap:8px}
.hero-stat{display:flex;align-items:baseline;gap:6px}
.hero-num{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1}
.hero-desc{font-size:11px;font-weight:500;color:var(--text2)}

/* Category mini-bars */
.cat-bars{display:flex;gap:6px;margin-top:12px;padding:0 16px}
.cat-bar-item{flex:1;text-align:center}
.cat-bar-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
.cat-bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* Streak badge */
.streak-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:12px;
  font-size:11px;font-weight:700;
  background:linear-gradient(135deg,#f97316,#ef4444);
  color:#fff;
}
.streak-badge.cold{background:var(--bg3);color:var(--text3)}

/* Notification bell */
.notif-btn{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);background:var(--bg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;position:relative;
  -webkit-tap-highlight-color:transparent;
}
.notif-btn.subscribed::after{
  content:'';position:absolute;top:4px;right:4px;
  width:6px;height:6px;border-radius:50%;background:var(--green);
}
.notif-btn:active{background:var(--bg2)}

/* ===== CELEBRATION ===== */
.celebration{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:4000;
  overflow:hidden;
}
.confetti{
  position:absolute;width:8px;height:8px;border-radius:2px;
  animation:confettiFall 1.2s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg) scale(0.3);opacity:0}
}
.celebration-text{
  position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
  font-size:40px;z-index:4001;pointer-events:none;
  animation:celebPop .6s ease-out forwards;
}
@keyframes celebPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* Break-it-down button */
.t-break{
  font-size:9px;font-weight:600;color:var(--blue);
  padding:2px 7px;border-radius:6px;
  background:#eff6ff;cursor:pointer;border:none;
  margin-left:4px;
}
.t-break:active{opacity:.6}

/* Task detail expansion */
.t-detail{
  display:none;margin-top:8px;padding:10px 12px;
  background:var(--bg2);border-radius:8px;
  font-size:12px;line-height:1.6;color:var(--text2);
  animation:detailIn .2s ease;
}
.t-detail.show{display:block}
@keyframes detailIn{from{opacity:0;max-height:0}to{opacity:1;max-height:200px}}
.t-detail-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:2px}
.t-detail-text{white-space:pre-wrap;word-break:break-word}
.t-expand{
  font-size:9px;font-weight:600;color:var(--text3);
  margin-left:auto;flex-shrink:0;
  transition:transform .2s;
}
.t-expand.open{transform:rotate(180deg)}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:calc(16px + var(--safe-top));left:16px;right:16px;z-index:2000;
  padding:12px 16px;border-radius:var(--rs);
  font-size:13px;font-weight:600;text-align:center;
  color:#fff;background:var(--black);
  box-shadow:0 8px 24px rgba(0,0,0,.15);
  transform:translateY(-100px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

/* ===== DESKTOP ===== */
@media(min-width:769px){
  .app{flex-direction:row}
  .header,.tab-bar{display:none}
  .panel{display:flex!important;border-right:1px solid var(--border)}
  .panel-insights{order:1;flex:1;border-right:1px solid var(--border)}
  .panel-tasks{order:2;width:400px;min-width:340px}
  .panel-chat{order:3;width:420px;min-width:360px;border-right:none}
  .chat-input-wrap{padding-bottom:12px}
  .tasks-pad{padding-bottom:16px}
  .desk-head{
    padding:16px 16px 12px;border-bottom:1px solid var(--border);
    font-size:14px;font-weight:700;flex-shrink:0;
  }
}
@media(max-width:768px){
  .desk-head{display:none}
  .panel-insights{display:none}
}
@media(max-width:375px){
  .bubble{font-size:13px;padding:9px 12px}
  .t-item{padding:10px 12px;gap:10px}
  .t-name{font-size:12px}
}

::-webkit-scrollbar{width:0;height:0}

/* ===== AUTH & SHARE UI ===== */
.auth-bar{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--text3);
}
.auth-name{font-weight:600;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.auth-btn{
  padding:4px 10px;border-radius:6px;
  font-size:10px;font-weight:600;
  border:1px solid var(--border);background:var(--bg);color:var(--text2);
  cursor:pointer;
}
.auth-btn:active{background:var(--bg2)}
.share-modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);z-index:3000;
  display:none;align-items:center;justify-content:center;
}
.share-modal-overlay.show{display:flex}
.share-modal{
  background:var(--bg);border-radius:var(--r);
  padding:24px;width:90%;max-width:340px;
  box-shadow:0 16px 48px rgba(0,0,0,.2);
}
.share-modal h3{font-size:15px;font-weight:700;margin-bottom:12px}
.share-modal input{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rs);
  font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;
}
.share-modal input:focus{border-color:var(--black)}
.share-modal-actions{display:flex;gap:8px;justify-content:flex-end}
.share-modal-actions button{
  padding:8px 16px;border-radius:var(--rs);font-size:12px;font-weight:600;
  border:none;cursor:pointer;
}
.share-cancel{background:var(--bg2);color:var(--text2)}
.share-send{background:var(--black);color:#fff}
</style>

<!-- Firebase SDK (CDN, no npm) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="app">

<!-- HEADER (mobile) -->
<div class="header">
  <div class="h-row">
    <div class="h-title">Mission Control</div>
    <div class="h-right">
      <div class="auth-bar" id="authBar">
        <button class="auth-btn" id="authBtn" onclick="handleAuth()">Sign In</button>
      </div>
      <button class="notif-btn" id="notifBtn" onclick="togglePushSubscription()" title="Push Notifications">&#x1F514;</button>
      <button class="auth-btn" onclick="openShareModal()" style="margin-left:4px">Share</button>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div class="share-modal-overlay" id="shareModal">
  <div class="share-modal">
    <h3>Share Tasks</h3>
    <input type="email" id="shareEmail" placeholder="Email address to share with">
    <div class="share-modal-actions">
      <button class="share-cancel" onclick="closeShareModal()">Cancel</button>
      <button class="share-send" onclick="sendShareInvite()">Share</button>
    </div>
  </div>
</div>

<!-- TAB BAR (mobile): Insights first, Tasks second, Dump third -->
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('insights',this)">Insights</div>
  <div class="tab" onclick="switchTab('tasks',this)">Tasks</div>
  <div class="tab" onclick="switchTab('chat',this)">Dump</div>
</div>

<!-- ===== INSIGHTS (first/active) ===== -->
<div class="panel panel-insights active" id="panelInsights">

<div class="panel panel-chat" id="panelChat">

  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <div class="chat-input-row">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </button>
      <textarea class="chat-textarea" id="chatInput" rows="1" placeholder="아무거나 던져봐..." oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== FIREBASE CONFIG =====
// Replace with your Firebase project config
const FIREBASE_CONFIG = {
  apiKey: "",
  authDomain: "",
  projectId: "",
};

// Init Firebase (only if config is set)
let firebaseApp = null;
let firebaseAuth = null;
let currentUser = null;
let idToken = null;

if (FIREBASE_CONFIG.apiKey && typeof firebase !== 'undefined') {
  firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
  firebaseAuth = firebase.auth();
}

// ===== API CONFIG =====
const API_BASE = window.location.origin + '/api';

// ===== STATE =====
let tasks = [];
let filter = 'all';
let isSending = false;
const CAT_BADGE = {content:'b-content', auto:'b-auto', growth:'b-growth', infra:'b-infra'};
const CAT_LABEL = {content:'Content', auto:'Auto', growth:'Growth', infra:'Infra'};
const PRI_COLOR = {'즉시':'var(--red)', '단기':'var(--orange)', '중기':'var(--blue)', '장기':'var(--text3)'};

// Voice recording state
let mediaRecorder = null;
let audioChunks = [];

// ===== AUTH FUNCTIONS =====
function updateAuthUI() {
  const bar = document.getElementById('authBar');
  const btn = document.getElementById('authBtn');
  if (currentUser) {
    bar.innerHTML = '<span class="auth-name">' + esc(currentUser.displayName || currentUser.email) + '</span>' +
      '<button class="auth-btn" onclick="handleAuth()">Logout</button>';
  } else {
    bar.innerHTML = '<button class="auth-btn" onclick="handleAuth()">Sign In</button>';
  }
}

async function handleAuth() {
  if (!firebaseAuth) {
    toast('Firebase not configured');
    return;
  }
  if (currentUser) {
    await firebaseAuth.signOut();
    currentUser = null;
    idToken = null;
    updateAuthUI();
    toast('Logged out');
    await fetchTasks();
  } else {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result = await firebaseAuth.signInWithPopup(provider);
      currentUser = result.user;
      idToken = await currentUser.getIdToken();
      updateAuthUI();
      toast('Welcome, ' + (currentUser.displayName || currentUser.email));
      await fetchTasks();
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        toast('Sign-in failed');
        console.error('Auth error:', e);
      }
    }
  }
}

// Share modal
function openShareModal() {
  document.getElementById('shareModal').classList.add('show');
  document.getElementById('shareEmail').focus();
}
function closeShareModal() {
  document.getElementById('shareModal').classList.remove('show');
  document.getElementById('shareEmail').value = '';
}
async function sendShareInvite() {
  const email = document.getElementById('shareEmail').value.trim();
  if (!email) return;
  try {
    await apiFetch('/sharing/invite', {
      method: 'POST',
      body: JSON.stringify({ email }),
    });
    toast('Shared with ' + email);
    closeShareModal();
  } catch (e) {
    toast('Share failed: ' + e.message);
  }
}

// ===== API HELPERS (with auth) =====
async function apiFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  // Attach Firebase auth token if available
  if (idToken) {
    headers['Authorization'] = 'Firebase ' + idToken;
  }
  const resp = await fetch(API_BASE + url, { ...opts, headers });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: resp.statusText }));
    throw new Error(err.error || resp.statusText);
  }
  return resp.json();
}

// ===== FETCH TASKS FROM API =====
async function fetchTasks() {
  try {
    const data = await apiFetch('/tasks');
    tasks = data.tasks.map(t => ({
      id: t.id,
      name: t.name,
      desc: t.desc,
      cat: t.category,
      pri: t.priority,
      sub: t.section,
      dur: t.duration_min,
      day: t.day,
      tags: t.tags || [],
      done: t.status === 'done',
    }));
    renderStats();
    renderTasks();
    renderInsights();
  } catch (e) {
    console.error('Failed to fetch tasks:', e);
    toast('Failed to load tasks');
  }
}

// ===== COMPLETION TRACKING =====
let completedCount = parseInt(localStorage.getItem('mc_completedCount') || '0');

// Variable reward messages (~20% chance)
const SURPRISE_MESSAGES = [
  'You\'re on fire today!',
  'Momentum is building!',
  'That felt good, didn\'t it?',
  'Unstoppable!',
  'Keep that energy going!',
  'One step closer to the goal!',
];

// ===== TOGGLE TASK (optimistic + API + behavioral science) =====
async function toggle(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;

  // Optimistic update
  const wasDone = t.done;
  t.done = !wasDone;
  renderTasks(); renderStats(); renderInsights();

  if (t.done) {
    // Progress Principle: celebration
    completedCount++;
    localStorage.setItem('mc_completedCount', completedCount);
    showCelebration();

    // Milestone toasts
    if (completedCount === 5) toast('5 tasks done! Great start!');
    else if (completedCount === 10) toast('10 tasks done! You\'re crushing it!');
    else if (completedCount === 25) toast('25 tasks done! Legendary!');
    else if (Math.random() < 0.2) {
      // Variable reward: ~20% chance surprise message
      toast(SURPRISE_MESSAGES[Math.floor(Math.random() * SURPRISE_MESSAGES.length)]);
    } else {
      toast('Done!');
    }
  } else {
    toast('Restored');
  }

  try {
    await apiFetch('/tasks/' + id, {
      method: 'PATCH',
      body: JSON.stringify({ status: t.done ? 'done' : 'todo' }),
    });
  } catch (e) {
    // Rollback on error
    t.done = wasDone;
    if (t.done === false) completedCount = Math.max(0, completedCount - 1);
    localStorage.setItem('mc_completedCount', completedCount);
    renderTasks(); renderStats(); renderInsights();
    toast('Failed to update');
  }
}

// ===== CELEBRATION ANIMATION =====
function showCelebration() {
  const container = document.createElement('div');
  container.className = 'celebration';
  const colors = ['#22c55e', '#3b82f6', '#f97316', '#ef4444', '#8b5cf6', '#eab308'];
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.3 + 's';
    c.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
    container.appendChild(c);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 1500);
}

// ===== BREAK IT DOWN (Tiny Habits) =====
async function breakItDown(id, event) {
  event.stopPropagation();
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  toast('Breaking down: ' + t.name);
  try {
    const resp = await fetch(API_BASE + '/voice/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(idToken ? { 'Authorization': 'Firebase ' + idToken } : {}) },
      body: JSON.stringify({ text: '"' + t.name + '" \uC774 \uD0DC\uC2A4\uD06C\uB97C 2-3\uAC1C\uC758 \uC791\uC740 \uC2A4\uD15D\uC73C\uB85C \uCABC\uAC1C\uC918' }),
    });
    const data = await resp.json();
    if (resp.ok) {
      // Add AI response to chat
      const aiText = '쪼개봄! ' + buildActionSummary(data.actions_taken || []) + formatActionsToChat(data.actions_taken || []);
      messages.push({role: 'ai', text: aiText, time: Date.now()});
      localStorage.setItem('mc3_chat', JSON.stringify(messages));
      renderChat();
      await fetchTasks();
      toast('Sub-tasks created!');
    }
  } catch (e) {
    toast('Break down failed');
  }
}

// ===== TASK DETAIL TOGGLE =====
function toggleDetail(id, event) {
  event.stopPropagation();
  const detail = document.getElementById('detail-' + id);
  const expand = document.getElementById('expand-' + id);
  if (detail) {
    detail.classList.toggle('show');
    if (expand) expand.classList.toggle('open');
  }
}

// ===== TABS =====
function switchTab(t, el) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');

  // Auto-activate voice when switching to Dump tab
  if (t === 'chat' && localStorage.getItem('mc_autoVoice') !== 'off') {
    setTimeout(() => {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') {
        startVoiceRecording();
      }
    }, 300);
  }
}

// ===== CHAT =====
const chatEl = document.getElementById('chatMessages');
let messages = JSON.parse(localStorage.getItem('mc3_chat') || '[]');

function renderChat() {
  let h = '';
  let lastDate = '';
  messages.forEach((m, i) => {
    const d = new Date(m.time);
    const ds = d.toLocaleDateString('ko-KR', {month:'short', day:'numeric'});
    if (ds !== lastDate) { h += '<div class="time-label">' + ds + '</div>'; lastDate = ds; }
    h += '<div class="msg-row ' + m.role + '" style="animation-delay:' + (i * .02) + 's">';
    h += '<div class="bubble">' + formatMsg(m.text) + '</div></div>';
  });
  if (messages.length === 0) {
    h = '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);text-align:center;padding:40px 20px">';
    h += '<div style="font-size:32px;margin-bottom:12px">&#x1F4AD;</div>';
    h += '<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">Brain Dump</div>';
    h += '<div style="font-size:13px;line-height:1.6">\uC0DD\uAC01\uB098\uB294 \uAC70 \uC544\uBB34\uAC70\uB098 \uB358\uC838\uBD10.<br>\uD14D\uC2A4\uD2B8\uB4E0 \uC74C\uC131\uC774\uB4E0.</div>';
    h += '</div>';
  }
  chatEl.innerHTML = h;
  chatEl.scrollTop = chatEl.scrollHeight;
}

function formatMsg(text) {
  const actionMatch = text.match(/\[ACTION:\{[^[\]]*\}\]/g);
  if (!actionMatch) return esc(text);
  let out = text;
  actionMatch.forEach(a => {
    try {
      const jsonStr = a.slice(8, -1); // strip [ACTION: and ]
      const json = JSON.parse(jsonStr);
      let card = '<div class="action-card">';
      const typeLabels = {
        task: '\u2713 태스크 생성', add: '\u2713 태스크 추가',
        check: '\u2705 완료 처리', done: '\u2705 완료 처리',
        uncheck: '\u21A9 완료 해제',
        remind: '\u23F0 리마인더', note: '\uD83D\uDCDD 메모',
        query: '\uD83D\uDCAC 응답', report: '\uD83D\uDCCA 리포트',
        update: '\u270F\uFE0F 수정', schedule: '\uD83D\uDCC5 일정 변경',
        prioritize: '\uD83D\uDD25 우선순위 변경',
      };
      const label = typeLabels[json.type] || json.type;
      card += '<div class="ac-type ac-' + json.type + '">' + label + '</div>';
      card += '<div class="ac-name">' + esc(json.name || json.message || json.response || '') + '</div>';
      if (json.detail) card += '<div class="ac-detail">' + esc(json.detail) + '</div>';
      card += '</div>';
      out = out.replace(a, card);
    } catch (e) {
      // Fallback: extract name/message from broken JSON via regex
      const nameMatch = a.match(/"(?:name|message|response)"\s*:\s*"([^"]*?)"/);
      const typeMatch = a.match(/"type"\s*:\s*"([^"]*?)"/);
      if (nameMatch) {
        const fallback = '<div class="action-card"><div class="ac-type ac-' + (typeMatch?typeMatch[1]:'task') + '">' + (typeMatch?typeMatch[1]:'action') + '</div><div class="ac-name">' + esc(nameMatch[1]) + '</div></div>';
        out = out.replace(a, fallback);
      } else {
        out = out.replace(a, '');
      }
    }
  });
  return out.replace(/\n/g, '<br>');
}

function showTypingIndicator() {
  const el = document.createElement('div');
  el.className = 'msg-row ai typing-indicator';
  el.id = 'typingIndicator';
  el.innerHTML = '<div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  chatEl.appendChild(el);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ===== BUILD ACTION SUMMARY (descriptive messages) =====
function buildActionSummary(actions) {
  if (!actions || actions.length === 0) return '처리했어.';
  const parts = actions.map(a => {
    const name = a.task_name || a.note || a.message || '';
    switch (a.action) {
      case 'check': return "'" + name + "' 완료 처리했어요";
      case 'uncheck': return "'" + name + "' 완료 해제했어요";
      case 'add': return "'" + name + "' 추가했어요";
      case 'update': return "'" + name + "' 수정했어요";
      case 'schedule': return "'" + name + "' 일정 변경했어요";
      case 'prioritize': return "'" + name + "' 우선순위 변경했어요";
      case 'remind': return '리마인더 설정했어요';
      case 'note': return '메모 저장했어요';
      case 'query': return a.response ? a.response.substring(0, 60) : '응답 완료';
      case 'report': return a.response ? a.response.substring(0, 60) : '리포트 생성';
      case 'commit': return "'" + name + "' 약속 잡았어요";
      default: return "'" + name + "' 처리했어요";
    }
  });
  if (parts.length === 1) return parts[0];
  return parts.length + '개 처리: ' + parts.join(', ');
}

// ===== FORMAT BACKEND ACTIONS TO CHAT =====
function formatActionsToChat(actions) {
  let text = '';
  for (const a of actions) {
    let obj;
    switch (a.action) {
      case 'check':
        obj = {type:"check", name:a.task_name||'', detail:"완료 처리됨"};
        break;
      case 'uncheck':
        obj = {type:"uncheck", name:a.task_name||'', detail:"완료 해제됨"};
        break;
      case 'add':
        obj = {type:"add", name:a.task_name||'', detail:"태스크 추가됨"};
        break;
      case 'update':
        obj = {type:"update", name:a.task_name||'', detail:a.note||'수정됨'};
        break;
      case 'schedule':
        obj = {type:"schedule", name:a.task_name||'', detail:'Day '+(a.day||'')+' 으로 변경'};
        break;
      case 'prioritize':
        obj = {type:"prioritize", name:a.task_name||'', detail:(a.priority||'')+' 으로 변경'};
        break;
      case 'remind':
        obj = {type:"remind", message:a.message||'', detail:a.remind_at||''};
        break;
      case 'query':
        obj = {type:"query", response:a.response||''};
        break;
      case 'report':
        obj = {type:"report", response:a.response||''};
        break;
      case 'note':
        obj = {type:"note", name:a.note||'', detail:"메모 저장됨"};
        break;
      case 'commit':
        obj = {type:"done", name:(a.task_name||'')+' 약속!', detail:'마감: '+(a.deadline||'')+(a.stake?' / 스테이크: '+a.stake:'')};
        break;
      default:
        obj = {type:a.action, name:JSON.stringify(a)};
    }
    text += '\n[ACTION:' + JSON.stringify(obj) + ']';
  }
  return text;
}

// ===== SEND MESSAGE (Real AI Agent) =====
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isSending) return;
  input.value = '';
  input.style.height = '42px';
  isSending = true;

  messages.push({role: 'user', text, time: Date.now()});
  renderChat();
  showTypingIndicator();

  try {
    const data = await apiFetch('/voice/text', {
      method: 'POST',
      body: JSON.stringify({ text }),
    });
    hideTypingIndicator();

    if (data.actions_taken) {
      // Zeigarnik Effect: "All captured" confirmation with specific summary
      const prefix = buildActionSummary(data.actions_taken);
      const aiText = prefix + formatActionsToChat(data.actions_taken);
      messages.push({role: 'ai', text: aiText, time: Date.now()});
      // Track streak
      updateStreak();
    } else {
      messages.push({role: 'ai', text: data.error || '\uCC98\uB9AC \uC911 \uC624\uB958\uAC00 \uBC1C\uC0DD\uD588\uC5B4.', time: Date.now()});
    }

    localStorage.setItem('mc3_chat', JSON.stringify(messages));
    renderChat();
    await fetchTasks();
  } catch (e) {
    hideTypingIndicator();
    messages.push({role: 'ai', text: '\uC11C\uBC84 \uC5F0\uACB0 \uC2E4\uD328. \uB2E4\uC2DC \uC2DC\uB3C4\uD574\uC918.', time: Date.now()});
    localStorage.setItem('mc3_chat', JSON.stringify(messages));
    renderChat();
  } finally {
    isSending = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoGrow(el) {
  el.style.height = '42px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===== VOICE RECORDING (Real MediaRecorder) =====
async function startVoiceRecording() {
  // 사전 체크: Secure Context & mediaDevices API 존재 여부
  if (!window.isSecureContext) {
    toast('🔒 현재 주소(' + location.hostname + ')에서는 마이크 사용 불가 — localhost로 접속해주세요');
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast('이 브라우저에서 마이크를 지원하지 않아요');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
    mediaRecorder.start();
    document.getElementById('micBtn').classList.add('recording');
  } catch (e) {
    console.error('[Mic Error]', e.name, e.message, e);
    if (e.name === 'NotAllowedError') {
      toast('마이크 권한이 차단됨 — 주소창 왼쪽 🔒 아이콘에서 허용해주세요');
    } else if (e.name === 'NotFoundError' || e.name === 'NotReadableError') {
      toast('연결된 마이크가 없거나 다른 앱이 사용 중이에요');
    } else if (e.name === 'AbortError') {
      toast('마이크 연결이 중단됐어요 — 다시 시도해주세요');
    } else {
      toast('마이크 오류(' + e.name + '): ' + e.message);
    }
  }
}

async function stopVoiceRecording() {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  document.getElementById('micBtn').classList.remove('recording');

  mediaRecorder.stop();
  await new Promise(r => mediaRecorder.addEventListener('stop', r, {once: true}));

  const blob = new Blob(audioChunks, {type: 'audio/webm'});
  audioChunks = [];

  // Show user message as "voice recording"
  messages.push({role: 'user', text: '\uD83C\uDFA4 \uC74C\uC131 \uC785\uB825 \uCC98\uB9AC \uC911...', time: Date.now()});
  renderChat();
  showTypingIndicator();

  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');

  try {
    const headers = {};
    if (idToken) headers['Authorization'] = 'Firebase ' + idToken;
    const resp = await fetch(API_BASE + '/voice/upload', {method: 'POST', headers, body: formData});
    const data = await resp.json();
    hideTypingIndicator();

    if (resp.ok) {
      // Update user message with actual transcript
      messages[messages.length - 1].text = data.transcript || '\uD83C\uDFA4 (\uC74C\uC131)';

      if (data.actions_taken) {
        const aiText = buildActionSummary(data.actions_taken) + formatActionsToChat(data.actions_taken);
        messages.push({role: 'ai', text: aiText, time: Date.now()});
      }

      localStorage.setItem('mc3_chat', JSON.stringify(messages));
      renderChat();
      await fetchTasks();
    } else {
      toast(data.error || '\uC74C\uC131 \uCC98\uB9AC \uC2E4\uD328');
    }
  } catch (e) {
    hideTypingIndicator();
    toast('\uC74C\uC131 \uC804\uC1A1 \uC2E4\uD328');
  }
  mediaRecorder = null;
}

function toggleMic() {

// ===== TASKS =====
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  renderTasks();
}

function renderFilters() {
  const pills = [
    {k:'all', l:'All'},
    {k:'\uC989\uC2DC', l:'Urgent'}, {k:'\uB2E8\uAE30', l:'Short'}, {k:'\uC911\uAE30', l:'Mid'}, {k:'\uC7A5\uAE30', l:'Long'},
  ];
  document.getElementById('filters').innerHTML = pills.map(p =>
    '<div class="fpill' + (filter === p.k ? ' active' : '') + '" onclick="setFilter(\'' + p.k + '\',this)">' + p.l + '</div>'
  ).join('');
}

function renderStats() {
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const urgent = tasks.filter(t => t.pri === '\uC989\uC2DC' && !t.done).length;
  document.getElementById('statsBar').innerHTML =
    '<div class="stat-item"><div class="stat-val">' + pct + '%</div><div class="stat-label">Done</div></div>'
    + '<div class="stat-item"><div class="stat-val" style="color:var(--red)">' + urgent + '</div><div class="stat-label">Urgent</div></div>'
    + '<div class="stat-item"><div class="stat-val" style="color:var(--green)">' + done + '</div><div class="stat-label">Complete</div></div>'
    + '<div class="stat-item"><div class="stat-val">' + total + '</div><div class="stat-label">Total</div></div>';
}

function renderTasks() {
  let list = [...tasks];
  if (filter !== 'all') {
    if (['\uC989\uC2DC', '\uB2E8\uAE30', '\uC911\uAE30', '\uC7A5\uAE30'].includes(filter)) list = list.filter(t => t.pri === filter);
    else list = list.filter(t => t.cat === filter);
  }

  const groups = {'\uC989\uC2DC': [], '\uB2E8\uAE30': [], '\uC911\uAE30': [], '\uC7A5\uAE30': []};
  list.forEach(t => { if (groups[t.pri]) groups[t.pri].push(t); });
  const labels = {'\uC989\uC2DC': 'Urgent', '\uB2E8\uAE30': 'Short-term', '\uC911\uAE30': 'Mid-term', '\uC7A5\uAE30': 'Long-term'};

  let h = '';
  for (const [pri, items] of Object.entries(groups)) {
    if (items.length === 0) continue;
    const dc = items.filter(t => t.done).length;
    items.sort((a, b) => a.done - b.done);
    h += '<div class="pri-section"><div class="pri-head">';
    h += '<div class="pri-dot" style="background:' + PRI_COLOR[pri] + '"></div>';
    h += '<div class="pri-label">' + labels[pri] + '</div>';
    h += '<div class="pri-count">' + dc + '/' + items.length + '</div></div>';
    items.forEach((t, i) => {
      const dur = t.dur ? (t.dur >= 60 ? Math.round(t.dur / 60) + 'h' : t.dur + 'm') : '';
      const hasDesc = t.desc && t.desc.trim();
      h += '<div class="t-item ' + (t.done ? 'done' : '') + '" style="animation-delay:' + (i * .03) + 's">';
      h += '<div class="t-chk ' + (t.done ? 'done' : '') + '" onclick="toggle(' + t.id + ')"></div>';
      h += '<div class="t-body" onclick="' + (hasDesc ? 'toggleDetail(' + t.id + ',event)' : 'toggle(' + t.id + ')') + '">';
      h += '<div class="t-name">' + esc(t.name) + '</div>';
      if (t.sub) h += '<div class="t-sub">' + esc(t.sub) + '</div>';
      h += '<div class="t-meta"><span class="t-badge ' + (CAT_BADGE[t.cat] || '') + '">' + (CAT_LABEL[t.cat] || t.cat) + '</span>';
      if (!t.done && t.dur && t.dur >= 60) h += '<button class="t-break" onclick="breakItDown(' + t.id + ',event)">Break down</button>';
      h += '</div>';
      if (hasDesc) {
        h += '<div class="t-detail" id="detail-' + t.id + '">';
        h += '<div class="t-detail-label">Details</div>';
        h += '<div class="t-detail-text">' + esc(t.desc) + '</div>';
        h += '</div>';
      }
      h += '</div>';
      if (hasDesc) h += '<div class="t-expand" id="expand-' + t.id + '" onclick="toggleDetail(' + t.id + ',event)">&#x25BC;</div>';
      else if (dur) h += '<div class="t-dur">' + dur + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  document.getElementById('tasksList').innerHTML = h;
}

// ===== INSIGHTS (Phase 2: Real stats from API) =====
async function renderInsights() {
  // First render with local task data (instant)
  renderInsightsFromLocal();
  // Then fetch real stats from API (async, no AI cost)
  try {
    const stats = await apiFetch('/report/stats');
    renderInsightsFromStats(stats);

    console.error('Failed to fetch stats:', e);
  }
}

function buildInsightCards(total, done, pct, urgent, cats, catDone) {
  let h = '';

  // Quick Win nudge
  h += '<div class="ins-card"><div class="ins-icon">\uD83C\uDFAF</div><div class="ins-head">\uC624\uB298\uC758 \uCD94\uCC9C</div>';
  if (urgent > 5) {
    const quickWin = tasks.filter(t => t.pri === '\uC989\uC2DC' && !t.done && t.dur).sort((a, b) => a.dur - b.dur)[0];
    if (quickWin) h += 'Quick Win: <span class="ins-highlight">' + esc(quickWin.name) + '</span> (' + quickWin.dur + '\uBD84) \uBD80\uD130 \uD574\uBCF4\uB294 \uAC74 \uC5B4\uB54C\uC694?';
    else h += '\uC989\uC2DC \uC2E4\uD589 \uD0DC\uC2A4\uD06C\uAC00 <span class="ins-highlight">' + urgent + '\uAC1C</span> \uB0A8\uC544\uC788\uC5B4\uC694.';
  } else if (urgent > 0) h += '\uC989\uC2DC \uC2E4\uD589 ' + urgent + '\uAC1C\uB9CC \uB05D\uB0B4\uBA74 \uC774\uBC88 \uC8FC \uD575\uC2EC\uC740 \uD074\uB9AC\uC5B4!';
  else h += '\uC989\uC2DC \uC2E4\uD589 \uD0DC\uC2A4\uD06C\uB97C \uBAA8\uB450 \uC644\uB8CC\uD588\uC5B4\uC694! \uD83C\uDF89';
  h += '</div>';

  // Progress
  h += '<div class="ins-card"><div class="ins-icon">\uD83D\uDCCA</div><div class="ins-head">\uC9C4\uD589 \uD604\uD669</div>';
  h += '\uC804\uCCB4 ' + total + '\uAC1C \uC911 <span class="ins-highlight">' + done + '\uAC1C \uC644\uB8CC</span> (' + pct + '%)<br>';
  h += 'Content: ' + (catDone.content || 0) + '/' + (cats.content || 0) + ' \u00B7 Auto: ' + (catDone.auto || 0) + '/' + (cats.auto || 0) + '<br>';
  h += 'Growth: ' + (catDone.growth || 0) + '/' + (cats.growth || 0) + ' \u00B7 Infra: ' + (catDone.infra || 0) + '/' + (cats.infra || 0);
  h += '</div>';

  // Pattern
  const autoCount = cats.auto || 0;
  const contentCount = cats.content || 0;
  h += '<div class="ins-card"><div class="ins-icon">\uD83D\uDCA1</div><div class="ins-head">\uD328\uD134 \uBD84\uC11D</div>';
  if (autoCount > contentCount) h += '\uC790\uB3D9\uD654 \uD0DC\uC2A4\uD06C(' + autoCount + '\uAC1C)\uAC00 \uCF58\uD150\uCE20(' + contentCount + '\uAC1C)\uBCF4\uB2E4 \uB9CE\uC544\uC694. \uC790\uB3D9\uD654 \uC6B0\uC120 \uCC98\uB9AC\uD558\uBA74 \uCF58\uD150\uCE20 \uC791\uC5C5 \uC2DC\uAC04\uC774 \uC904\uC5B4\uB4E4\uC5B4\uC694.';
  else h += '\uCF58\uD150\uCE20 \uD0DC\uC2A4\uD06C(' + contentCount + '\uAC1C)\uAC00 \uAC00\uC7A5 \uB9CE\uC544\uC694. \uAC13\uD15C\uD648 \uAC1C\uC120\uC5D0 \uC9D1\uC911\uD558\uBA74 \uD3C9\uADE0 \uC7AC\uC0DD \uBAA9\uD45C\uC5D0 \uAC00\uC7A5 \uBE68\uB9AC \uB3C4\uB2EC\uD560 \uC218 \uC788\uC5B4\uC694.';
  h += '</div>';

  // Loss aversion: overdue urgent
  if (urgent > 3) {
    h += '<div class="ins-card" style="border-left:3px solid var(--red);background:#fef2f2"><div class="ins-icon">\u26A0\uFE0F</div><div class="ins-head">Momentum at risk</div>';
    const skipped = tasks.filter(t => t.pri === '\uC989\uC2DC' && !t.done && t.day && t.day <= 2);
    if (skipped.length > 0) h += skipped.map(t => '<span class="ins-highlight">' + esc(t.name) + '</span>').join(', ') + ' \u2014 \uB354 \uC791\uAC8C \uCABC\uAC1C\uBCFC\uAE4C\uC694?';
    else h += '\uC989\uC2DC \uC2E4\uD589 \uD0DC\uC2A4\uD06C \uC911 \uC77C\uBD80\uAC00 \uACC4\uC18D \uBC00\uB9AC\uACE0 \uC788\uC5B4\uC694. \uC624\uB298 \uB531 1\uAC1C\uB9CC \uACE8\uB77C\uC11C \uD574\uCE58\uC6CC\uBCF4\uC138\uC694.';
    h += '</div>';
  }

  // BJ Fogg B=MAP: ability check for large tasks
  const bigTasks = tasks.filter(t => !t.done && t.dur && t.dur >= 60);
  if (bigTasks.length > 0) {
    h += '<div class="ins-card" style="border-left:3px solid var(--blue);background:#eff6ff"><div class="ins-icon">\uD83E\uDDE9</div><div class="ins-head">Too big to start?</div>';
    h += bigTasks.slice(0, 3).map(t =>
      '<span class="ins-highlight">' + esc(t.name) + '</span> (' + t.dur + '\uBD84)'
    ).join(', ');
    h += ' \u2014 \uD0DC\uC2A4\uD06C \uC606\uC758 "Break down" \uBC84\uD2BC\uC73C\uB85C \uC791\uAC8C \uCABC\uAC1C\uBCF4\uB294 \uAC74 \uC5B4\uB54C\uC694?';
    h += '</div>';
  }

  // Hooked Model: investment tracking
  const dumpCount = messages.filter(m => m.role === 'user').length;
  h += '<div class="ins-card"><div class="ins-icon">\uD83D\uDCC8</div><div class="ins-head">Your Investment</div>';
  h += '<span class="ins-highlight">' + completedCount + '</span> tasks completed \u00B7 ';
  h += '<span class="ins-highlight">' + dumpCount + '</span> brain dumps';
  const streak = parseInt(localStorage.getItem('mc_streak') || '0');
  if (streak > 1) h += ' \u00B7 <span class="ins-highlight">' + streak + ' day</span> streak';
  h += '</div>';

  return h;
}

// AI Insights (on-demand, costs tokens)
async function refreshAIInsights(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Loading...'; }
  const container = document.getElementById('aiInsightsContainer');
  if (container) container.innerHTML = '<div style="color:var(--text3);font-size:12px">Generating insights...</div>';

  try {
    const data = await apiFetch('/report/insights');
    let h = '';
    (data.insights || []).forEach(ins => {
      h += '<div class="ins-card"><div class="ins-icon">' + (ins.icon || '\uD83D\uDCA1') + '</div>';
      h += '<div class="ins-head">' + esc(ins.title) + '</div>';
      h += esc(ins.body) + '</div>';
    });
    if (container) container.innerHTML = h || '<div style="color:var(--text3);font-size:12px">No insights</div>';
  } catch (e) {
    if (container) container.innerHTML = '<div style="color:var(--text3);font-size:12px">Failed: ' + esc(e.message) + '</div>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Refresh AI'; }
  }
}

// Objective progress update
async function promptObjectiveUpdate(objId) {
  const newVal = prompt('Enter current value:');
  if (newVal === null || newVal === '') return;
  const num = parseFloat(newVal);
  if (isNaN(num)) { toast('Invalid number'); return; }
  try {
    await apiFetch('/objectives/' + objId, {
      method: 'PATCH',
      body: JSON.stringify({ current: num }),
    });
    toast('Updated!');
    renderInsights();
  } catch (e) {
    toast('Failed to update');
  }
}

async function loadObjectives() {
  try {
    const data = await apiFetch('/objectives');
    const objectives = data.objectives || [];
    let h = '';
    if (objectives.length === 0) {
      h = '<div style="color:var(--text3);font-size:12px">No objectives set</div>';
    } else {
      objectives.forEach(obj => {
        const pct = obj.target ? Math.round((obj.current || 0) / obj.target * 100) : 0;
        h += '<div class="obj-mini" onclick="promptObjectiveUpdate(\'' + obj.id + '\')" style="cursor:pointer">';
        h += '<div class="obj-mini-top"><div class="obj-mini-name">' + esc(obj.title) + '</div>';
        h += '<div class="obj-mini-pct">' + pct + '%</div></div>';
        h += '<div class="obj-mini-bar"><div class="obj-mini-fill" style="width:' + Math.min(pct, 100) + '%"></div></div>';
        h += '</div>';
      });
    }
    const el = document.getElementById('objectivesList');
    if (el) el.innerHTML = h;
  } catch (e) {
    const el = document.getElementById('objectivesList');
    if (el) el.innerHTML = '<div style="color:var(--text3);font-size:12px">Failed to load</div>';
  }
}

// ===== UTILS =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Streak tracking (Hooked Model: investment)
function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  const lastActive = localStorage.getItem('mc_lastActive');
  let streak = parseInt(localStorage.getItem('mc_streak') || '0');
  if (lastActive === today) return; // Already counted today
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (lastActive === yesterday) {
    streak++;
  } else if (lastActive !== today) {
    streak = 1;
  }
  localStorage.setItem('mc_streak', streak);
  localStorage.setItem('mc_lastActive', today);
}

// ===== SERVICE WORKER + PUSH NOTIFICATIONS =====
let swRegistration = null;
let pushSubscription = null;

async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swRegistration = await navigator.serviceWorker.register('/sw.js');
    console.log('[SW] Registered');
    // Check existing push subscription
    pushSubscription = await swRegistration.pushManager.getSubscription();
    updateNotifBtn();
  } catch (e) {
    console.error('[SW] Registration failed:', e);
  }
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  if (pushSubscription) {
    btn.classList.add('subscribed');
    btn.title = 'Notifications ON';
  } else {
    btn.classList.remove('subscribed');
    btn.title = 'Enable Notifications';
  }
}

async function togglePushSubscription() {
  if (!swRegistration) {
    toast('Service Worker not ready');
    return;
  }

  if (pushSubscription) {
    // Unsubscribe
    try {
      const endpoint = pushSubscription.endpoint;
      await pushSubscription.unsubscribe();
      pushSubscription = null;
      updateNotifBtn();
      await apiFetch('/push/unsubscribe', {
        method: 'POST',
        body: JSON.stringify({ endpoint }),
      });
      toast('Notifications OFF');
    } catch (e) {
      toast('Failed to unsubscribe');
    }
  } else {
    // Subscribe
    try {
      const resp = await apiFetch('/push/vapid-key');
      const vapidKey = resp.publicKey;

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        toast('Notification permission denied');
        return;
      }

      pushSubscription = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidKey),
      });

      await apiFetch('/push/subscribe', {
        method: 'POST',
        body: JSON.stringify(pushSubscription.toJSON()),
      });

      updateNotifBtn();
      toast('Notifications ON!');

      // Send test notification
      await apiFetch('/push/test', { method: 'POST' });
    } catch (e) {
      console.error('[Push] Subscribe error:', e);
      toast('Failed: ' + (e.message || 'Push not supported'));
    }
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

// ===== INIT =====
(async function init() {
  renderChat();
  renderFilters();
  registerServiceWorker();

  // Firebase auth state listener
  if (firebaseAuth) {
    firebaseAuth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        idToken = await user.getIdToken();
        updateAuthUI();
      } else {
        currentUser = null;
        idToken = null;
        updateAuthUI();
      }
      await fetchTasks();
    });
  } else {
    // No Firebase configured — dev mode, load directly
    await fetchTasks();
  }
})();
</script>
