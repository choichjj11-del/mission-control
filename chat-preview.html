<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --bg3:#ebebeb;
  --surface:#ffffff;
  --border:#e5e5e5;
  --border2:#d4d4d4;
  --text:#0a0a0a;
  --text2:#525252;
  --text3:#a3a3a3;
  --black:#0a0a0a;
  --accent:#0a0a0a;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,.08);
  --red:#ef4444;
  --blue:#3b82f6;
  --orange:#f97316;
  --user-bubble:#0a0a0a;
  --user-text:#ffffff;
  --ai-bubble:#f5f5f5;
  --ai-text:#0a0a0a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --r:14px;
  --rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* ===== HEADER ===== */
.header{
  flex-shrink:0;
  padding:10px 20px;
  padding-top:calc(10px + var(--safe-top));
  border-bottom:1px solid var(--border);
  background:var(--bg);
  z-index:10;
}
.h-row{display:flex;align-items:center;justify-content:space-between}
.h-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.h-right{display:flex;align-items:center;gap:6px}
.h-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.h-status{font-size:11px;color:var(--text3);font-weight:500}

/* ===== TABS ===== */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--bg);
}
.tab{
  flex:1;text-align:center;
  padding:11px 0;
  font-size:13px;font-weight:600;
  color:var(--text3);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{color:var(--black);border-bottom-color:var(--black)}

/* ===== PANELS ===== */
.panel{flex:1;overflow:hidden;display:none;flex-direction:column}
.panel.active{display:flex}

/* ===== CHAT PANEL ===== */
.chat-messages{
  flex:1;overflow-y:auto;
  padding:16px 16px 8px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  display:flex;flex-direction:column;
}
.chat-messages>*{animation:msgIn .25s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Message rows */
.msg-row{display:flex;margin-bottom:10px;max-width:88%}
.msg-row.user{align-self:flex-end}
.msg-row.ai{align-self:flex-start}

.bubble{
  padding:10px 14px;
  font-size:14px;line-height:1.5;
  border-radius:18px;
  word-break:break-word;
}
.msg-row.user .bubble{
  background:var(--user-bubble);color:var(--user-text);
  border-bottom-right-radius:4px;
}
.msg-row.ai .bubble{
  background:var(--ai-bubble);color:var(--ai-text);
  border-bottom-left-radius:4px;
  border:1px solid var(--border);
}

/* Action cards inside AI messages */
.action-card{
  margin-top:8px;
  padding:10px 12px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--rs);
  font-size:12px;
}
.action-card .ac-type{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:4px;
}
.ac-task{color:var(--green)}
.ac-remind{color:var(--orange)}
.ac-note{color:var(--blue)}
.ac-done{color:var(--green)}
.action-card .ac-name{font-weight:600;font-size:13px}
.action-card .ac-detail{color:var(--text2);font-size:11px;margin-top:2px}

/* Time label */
.time-label{
  text-align:center;font-size:10px;
  color:var(--text3);font-weight:500;
  margin:12px 0 8px;
}

/* ===== CHAT INPUT ===== */
.chat-input-wrap{
  flex-shrink:0;
  padding:8px 12px;
  padding-bottom:calc(8px + var(--safe-bottom));
  border-top:1px solid var(--border);
  background:var(--bg);
}
.chat-input-row{
  display:flex;align-items:flex-end;gap:8px;
}
.chat-textarea{
  flex:1;
  border:1px solid var(--border);
  border-radius:22px;
  padding:10px 16px;
  font-family:inherit;font-size:14px;
  color:var(--text);background:var(--bg2);
  outline:none;resize:none;
  min-height:42px;max-height:120px;
  line-height:1.4;
  transition:border-color .15s;
}
.chat-textarea:focus{border-color:var(--black)}
.chat-textarea::placeholder{color:var(--text3)}
.chat-send{
  width:42px;height:42px;
  border-radius:50%;border:none;
  background:var(--black);color:#fff;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.chat-send:active{transform:scale(.92);background:#333}
.chat-send:disabled{background:var(--bg3);color:var(--text3)}
.mic-btn{
  width:42px;height:42px;
  border-radius:50%;border:2px solid var(--border);
  background:var(--bg);color:var(--text2);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.mic-btn:active{border-color:var(--black);color:var(--black)}
.mic-btn.recording{
  border-color:var(--red);color:var(--red);
  animation:micPulse 1.5s infinite;
}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* ===== TASKS PANEL ===== */
.tasks-scroll{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
.tasks-pad{padding:12px 16px calc(12px + var(--safe-bottom))}

/* Priority sections */
.pri-section{margin-bottom:12px}
.pri-head{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;margin-bottom:4px;
}
.pri-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pri-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.pri-count{margin-left:auto;font-size:11px;color:var(--text3);font-weight:600}

/* Task items */
.t-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rs);
  margin-bottom:4px;
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  animation:slideIn .2s ease both;
}
.t-item:active{background:var(--bg2);transform:scale(.985)}
.t-item.done{opacity:.3}
.t-item.done .t-name{text-decoration:line-through;color:var(--text3)}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.t-chk{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.t-chk.done{background:var(--black);border-color:var(--black)}
.t-chk.done::after{content:'\2713';color:#fff;font-size:11px;font-weight:700}

.t-body{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:600;line-height:1.4}
.t-sub{font-size:11px;color:var(--text3);margin-top:1px}
.t-meta{display:flex;gap:4px;margin-top:4px}
.t-badge{
  font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:6px;
  letter-spacing:.2px;
}
.b-content{background:#fef2f2;color:#dc2626}
.b-auto{background:#eff6ff;color:#2563eb}
.b-growth{background:#f5f3ff;color:#7c3aed}
.b-infra{background:var(--green-bg);color:#16a34a}
.t-dur{
  font-size:10px;font-weight:600;color:var(--text3);
  background:var(--bg2);padding:3px 8px;border-radius:6px;
  flex-shrink:0;
}

/* Stats bar at top of tasks */
.stats-bar{
  display:flex;gap:0;
  margin-bottom:12px;
  border:1px solid var(--border);
  border-radius:var(--rs);
  overflow:hidden;
}
.stat-item{
  flex:1;padding:12px 8px;text-align:center;
  border-right:1px solid var(--border);
}
.stat-item:last-child{border-right:none}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1}
.stat-label{font-size:9px;font-weight:600;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* Filter pills */
.filters{
  display:flex;gap:6px;
  margin-bottom:12px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.filters::-webkit-scrollbar{display:none}
.fpill{
  padding:6px 12px;border-radius:20px;
  font-size:11px;font-weight:600;white-space:nowrap;
  cursor:pointer;
  background:var(--bg2);color:var(--text2);
  border:1px solid transparent;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.fpill.active{background:var(--black);color:#fff}

/* ===== INSIGHTS PANEL ===== */
.insights-scroll{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.insights-pad{padding:16px 16px calc(16px + var(--safe-bottom))}
.ins-title{font-size:15px;font-weight:700;margin-bottom:12px}
.ins-card{
  background:var(--bg2);border-radius:var(--rs);
  padding:14px 16px;margin-bottom:8px;
  font-size:13px;line-height:1.6;color:var(--text2);
}
.ins-card .ins-icon{font-size:16px;margin-bottom:6px}
.ins-card .ins-head{font-weight:700;color:var(--text);margin-bottom:4px;font-size:13px}
.ins-card .ins-highlight{color:var(--black);font-weight:700}
.obj-mini{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rs);padding:12px 14px;margin-bottom:6px;
}
.obj-mini-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.obj-mini-name{font-size:13px;font-weight:700}
.obj-mini-pct{font-size:12px;font-weight:700;color:var(--text3)}
.obj-mini-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.obj-mini-fill{height:100%;border-radius:2px;background:var(--black)}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:calc(16px + var(--safe-top));left:16px;right:16px;z-index:2000;
  padding:12px 16px;border-radius:var(--rs);
  font-size:13px;font-weight:600;text-align:center;
  color:#fff;background:var(--black);
  box-shadow:0 8px 24px rgba(0,0,0,.15);
  transform:translateY(-100px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

/* ===== DESKTOP ===== */
@media(min-width:769px){
  .app{flex-direction:row}
  .header,.tab-bar{display:none}
  .panel{display:flex!important;border-right:1px solid var(--border)}
  .panel-chat{width:420px;min-width:360px}
  .panel-tasks{width:400px;min-width:340px}
  .panel-insights{flex:1;border-right:none}
  .chat-input-wrap{padding-bottom:12px}
  .tasks-pad{padding-bottom:16px}
  .desk-head{
    padding:16px 16px 12px;border-bottom:1px solid var(--border);
    font-size:14px;font-weight:700;flex-shrink:0;
  }
}
@media(max-width:768px){
  .desk-head{display:none}
  .panel-insights{display:none}
}
@media(max-width:375px){
  .bubble{font-size:13px;padding:9px 12px}
  .t-item{padding:10px 12px;gap:10px}
  .t-name{font-size:12px}
}

::-webkit-scrollbar{width:0;height:0}
</style>
</head>

const CAT_LABEL={content:'Content',auto:'Auto',growth:'Growth',infra:'Infra'};
const PRI_COLOR={'즉시':'var(--red)','단기':'var(--orange)','중기':'var(--blue)','장기':'var(--text3)'};

function isDone(id){return doneIds.includes(id)||TASKS.find(t=>t.id===id)?.done}
function toggle(id){
  if(TASKS.find(t=>t.id===id)?.done) return;
  const i=doneIds.indexOf(id);
  if(i>=0) doneIds.splice(i,1); else doneIds.push(id);
  localStorage.setItem('mc3_done',JSON.stringify(doneIds));
  renderTasks();renderStats();renderInsights();
  toast(isDone(id)?'Done!':'Restored');
}

// ===== CHAT =====
const chatEl=document.getElementById('chatMessages');
let messages=JSON.parse(localStorage.getItem('mc3_chat')||'[]');

function addSystemMsg(text){
  messages.push({role:'ai',text,time:Date.now()});
  localStorage.setItem('mc3_chat',JSON.stringify(messages));
}

function renderChat(){
  let h='';
  let lastDate='';
  messages.forEach((m,i)=>{
    const d=new Date(m.time);
    const ds=d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    if(ds!==lastDate){h+='<div class="time-label">'+ds+'</div>';lastDate=ds;}
    h+='<div class="msg-row '+m.role+'" style="animation-delay:'+(i*.02)+'s">';
    h+='<div class="bubble">'+formatMsg(m.text)+'</div></div>';
  });
  if(messages.length===0){
    h='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);text-align:center;padding:40px 20px">';
    h+='<div style="font-size:32px;margin-bottom:12px">💭</div>';
    h+='<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">Brain Dump</div>';
    h+='<div style="font-size:13px;line-height:1.6">생각나는 거 아무거나 던져봐.<br>텍스트든 음성이든.</div>';
    h+='</div>';
  }
  chatEl.innerHTML=h;
  chatEl.scrollTop=chatEl.scrollHeight;
}

function formatMsg(text){
  // Parse action cards
  const actionMatch=text.match(/\[ACTION:(.*?)\]/g);
  if(!actionMatch) return esc(text);
  let out=text;
  actionMatch.forEach(a=>{
    try{
      const json=JSON.parse(a.replace('[ACTION:','').replace(']',''));
      let card='<div class="action-card">';
      card+='<div class="ac-type ac-'+json.type+'">'+(json.type==='task'?'✓ 태스크 생성':json.type==='remind'?'⏰ 리마인더':json.type==='done'?'✅ 완료 처리':'📝 메모')+'</div>';
      card+='<div class="ac-name">'+esc(json.name||json.message||'')+'</div>';
      if(json.detail) card+='<div class="ac-detail">'+esc(json.detail)+'</div>';
      card+='</div>';
      out=out.replace(a,card);
    }catch(e){out=out.replace(a,'');}
  });
  return out.replace(/\n/g,'<br>');
}

function sendMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  input.style.height='42px';

  messages.push({role:'user',text,time:Date.now()});
  renderChat();

  // Simulate AI processing
  setTimeout(()=>{
    const response=processInput(text);
    messages.push({role:'ai',text:response,time:Date.now()});
    localStorage.setItem('mc3_chat',JSON.stringify(messages));
    renderChat();
    renderTasks();renderStats();renderInsights();
  },400);
}

function processInput(text){
  const lower=text.toLowerCase();

  // Check/done pattern
  for(const t of TASKS){
    if(text.includes(t.name.substring(0,6)) && (lower.includes('완료')||lower.includes('했')||lower.includes('끝')||lower.includes('done'))){
      if(!isDone(t.id)){
        doneIds.push(t.id);
        localStorage.setItem('mc3_done',JSON.stringify(doneIds));
        return '처리했어! [ACTION:{"type":"done","name":"'+t.name+'"}]';
      }
    }
  }

  // Remind pattern
  if(lower.includes('리마인')||lower.includes('알려')||lower.includes('remind')||lower.includes('알람')){
    const timeMatch=text.match(/(\d{1,2})(시|am|pm)/i);
    const time=timeMatch?timeMatch[0]:'내일 아침';
    return '알림 설정했어.\n[ACTION:{"type":"remind","name":"'+esc(text.substring(0,30))+'","detail":"'+time+' 알림 예정"}]';
  }

  // Add task pattern
  if(lower.includes('해야')||lower.includes('할 것')||lower.includes('추가')||lower.includes('등록')||lower.includes('todo')){
    const taskName=text.replace(/해야|할 것|추가|등록|좀|해줘|todo/gi,'').trim().substring(0,40);
    if(taskName.length>2){
      return '태스크에 넣었어.\n[ACTION:{"type":"task","name":"'+esc(taskName)+'","detail":"단기 · 미배정"}]';
    }
  }

  // General brain dump - just store as note
  if(text.length>5){
    // Try to extract actionable items
    const items=text.split(/[,.\n그리고]+/).map(s=>s.trim()).filter(s=>s.length>3);
    if(items.length>=2){
      let resp='정리했어. '+items.length+'개 잡았다.\n';
      items.forEach(item=>{
        resp+='\n[ACTION:{"type":"task","name":"'+esc(item.substring(0,30))+'","detail":"브레인덤프에서 추출"}]';
      });
      return resp;
    }
    return '메모했어.\n[ACTION:{"type":"note","name":"'+esc(text.substring(0,40))+(text.length>40?'...':'')+'","detail":"'+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 기록"}]';
  }

  return '뭐든 말해봐. 할 일, 생각, 리마인더 — 다 던져도 돼.';
}

function renderFilters(){

  ];
  document.getElementById('filters').innerHTML=pills.map(p=>
    '<div class="fpill'+(filter===p.k?' active':'')+'" onclick="setFilter(\''+p.k+'\',this)">'+p.l+'</div>'

function renderStats(){
  const done=TASKS.filter(t=>isDone(t.id)).length;
  const total=TASKS.length;
  const pct=Math.round(done/total*100);
  const urgent=TASKS.filter(t=>t.pri==='즉시'&&!isDone(t.id)).length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat-item"><div class="stat-val">'+pct+'%</div><div class="stat-label">Done</div></div>'
    +'<div class="stat-item"><div class="stat-val" style="color:var(--red)">'+urgent+'</div><div class="stat-label">Urgent</div></div>'
    +'<div class="stat-item"><div class="stat-val" style="color:var(--green)">'+done+'</div><div class="stat-label">Complete</div></div>'
    +'<div class="stat-item"><div class="stat-val">'+total+'</div><div class="stat-label">Total</div></div>';
}

function renderTasks(){
  let list=TASKS.map(t=>({...t,done:isDone(t.id)}));
  if(filter!=='all'){
    if(['즉시','단기','중기','장기'].includes(filter)) list=list.filter(t=>t.pri===filter);
    else list=list.filter(t=>t.cat===filter);
  }

  const groups={'즉시':[],'단기':[],'중기':[],'장기':[]};
  list.forEach(t=>{if(groups[t.pri]) groups[t.pri].push(t)});
  const labels={'즉시':'Urgent','단기':'Short-term','중기':'Mid-term','장기':'Long-term'};

  let h='';
  for(const [pri,items] of Object.entries(groups)){
    if(items.length===0) continue;
    const dc=items.filter(t=>t.done).length;
    // Sort: undone first
    items.sort((a,b)=>a.done-b.done);
    h+='<div class="pri-section"><div class="pri-head">';
    h+='<div class="pri-dot" style="background:'+PRI_COLOR[pri]+'"></div>';
    h+='<div class="pri-label">'+labels[pri]+'</div>';
    h+='<div class="pri-count">'+dc+'/'+items.length+'</div></div>';
    items.forEach((t,i)=>{
      const dur=t.dur?(t.dur>=60?Math.round(t.dur/60)+'h':t.dur+'m'):'';
      h+='<div class="t-item '+(t.done?'done':'')+'" style="animation-delay:'+(i*.03)+'s" onclick="toggle('+t.id+')">';
      h+='<div class="t-chk '+(t.done?'done':'')+'"></div>';
      h+='<div class="t-body"><div class="t-name">'+esc(t.name)+'</div>';
      if(t.sub) h+='<div class="t-sub">'+esc(t.sub)+'</div>';
      h+='<div class="t-meta"><span class="t-badge '+CAT_BADGE[t.cat]+'">'+CAT_LABEL[t.cat]+'</span></div>';
      h+='</div>';
      if(dur) h+='<div class="t-dur">'+dur+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  document.getElementById('tasksList').innerHTML=h;
}

// ===== INSIGHTS =====
function renderInsights(){
  const done=TASKS.filter(t=>isDone(t.id)).length;
  const total=TASKS.length;
  const urgent=TASKS.filter(t=>t.pri==='즉시'&&!isDone(t.id)).length;
  const cats={content:0,auto:0,growth:0,infra:0};
  const catDone={content:0,auto:0,growth:0,infra:0};
  TASKS.forEach(t=>{cats[t.cat]++;if(isDone(t.id))catDone[t.cat]++});

  let h='<div class="ins-title">Insights</div>';

  // Smart recommendations
  h+='<div class="ins-card"><div class="ins-icon">🎯</div><div class="ins-head">오늘의 추천</div>';
  if(urgent>5) h+='즉시 실행 태스크가 <span class="ins-highlight">'+urgent+'개</span> 남아있어요. 가장 짧은 것부터 해치워보는 건 어때요?';
  else if(urgent>0) h+='즉시 실행 '+urgent+'개만 끝내면 이번 주 핵심은 클리어!';
  else h+='즉시 실행 태스크를 모두 완료했어요! 🎉';
  h+='</div>';

  h+='<div class="ins-card"><div class="ins-icon">📊</div><div class="ins-head">진행 현황</div>';
  h+='전체 '+total+'개 중 <span class="ins-highlight">'+done+'개 완료</span> ('+Math.round(done/total*100)+'%)<br>';
  h+='Content: '+catDone.content+'/'+cats.content+' · Auto: '+catDone.auto+'/'+cats.auto+'<br>';
  h+='Growth: '+catDone.growth+'/'+cats.growth+' · Infra: '+catDone.infra+'/'+cats.infra;
  h+='</div>';

  // Pattern insight
  h+='<div class="ins-card"><div class="ins-icon">💡</div><div class="ins-head">패턴 분석</div>';
  const autoCount=cats.auto;
  const contentCount=cats.content;
  if(autoCount>contentCount) h+='자동화 태스크('+autoCount+'개)가 콘텐츠('+contentCount+'개)보다 많아요. 자동화 우선 처리하면 콘텐츠 작업 시간이 줄어들어요.';
  else h+='콘텐츠 태스크('+contentCount+'개)가 가장 많아요. 갓템홈 개선에 집중하면 평균 재생 목표에 가장 빠르게 도달할 수 있어요.';
  h+='</div>';

  // Nudge for skipped urgent
  if(urgent>3){
    h+='<div class="ins-card" style="border-left:3px solid var(--red);background:#fef2f2"><div class="ins-icon">⚠️</div><div class="ins-head">3일째 미루는 태스크</div>';
    const skipped=TASKS.filter(t=>t.pri==='즉시'&&!isDone(t.id)&&t.day&&t.day<=2);
    if(skipped.length>0) h+=skipped.map(t=>'<span class="ins-highlight">'+esc(t.name)+'</span>').join(', ')+' — 더 작게 쪼개볼까요?';
    else h+='즉시 실행 태스크 중 일부가 계속 밀리고 있어요. 오늘 딱 1개만 골라서 해치워보세요.';
    h+='</div>';
  }

  // Objectives
  h+='<div style="margin-top:20px"><div class="ins-title">Objectives</div>';
  h+='<div class="obj-mini"><div class="obj-mini-top"><div class="obj-mini-name">월 수익 10M</div><div class="obj-mini-pct">0%</div></div><div class="obj-mini-bar"><div class="obj-mini-fill" style="width:0%"></div></div></div>';
  h+='<div class="obj-mini"><div class="obj-mini-top"><div class="obj-mini-name">평균 재생 15K+</div><div class="obj-mini-pct">0%</div></div><div class="obj-mini-bar"><div class="obj-mini-fill" style="width:0%"></div></div></div>';
  h+='<div class="obj-mini"><div class="obj-mini-top"><div class="obj-mini-name">다국어 파일럿</div><div class="obj-mini-pct">0%</div></div><div class="obj-mini-bar"><div class="obj-mini-fill" style="width:0%"></div></div></div>';
  h+='</div>';

  document.getElementById('insightsContent').innerHTML=h;
}
