# Mission Control — Nginx Reverse Proxy Config
# Add this to /etc/nginx/sites-available/mission-control
# Then: ln -s /etc/nginx/sites-available/mission-control /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name dashboard.lucyhome.ai;

    # Redirect HTTP to HTTPS (Cloudflare handles SSL)
    # If using Cloudflare Full SSL, keep this as HTTP

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload size for voice files (25MB max)
        client_max_body_size 25m;
    }
}
